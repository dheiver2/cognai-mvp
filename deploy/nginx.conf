# cognai — reverse proxy
#
# Substituído em runtime pelo setup.sh:
#   __SERVER_NAME__   → seu domínio ou _
#   __PORT__          → porta interna do uvicorn

upstream cognai_app {
    server 127.0.0.1:__PORT__ fail_timeout=0;
}

server {
    listen 80;
    listen [::]:80;
    server_name __SERVER_NAME__;

    # Limites de upload — arquivos Holter podem ter centenas de MB
    client_max_body_size 2048m;
    client_body_timeout  600s;
    proxy_read_timeout   600s;
    proxy_send_timeout   600s;

    # Logs
    access_log /var/log/nginx/cognai.access.log;
    error_log  /var/log/nginx/cognai.error.log;

    # Compressão
    gzip on;
    gzip_types text/plain text/css text/javascript application/json application/javascript image/svg+xml;
    gzip_min_length 1024;

    # Headers de segurança
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

    # Proxy para o uvicorn
    location / {
        proxy_pass http://cognai_app;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_buffering off;
    }
}
